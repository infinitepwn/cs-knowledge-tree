site_name: CS Knowledge Tree
site_description: "A personal computer science knowledge tree for systems, networking, cryptography, and engineering practice."
site_url: https://infinitepwn.github.io/cs-knowledge-tree/
repo_url: https://github.com/infinitepwn/cs-knowledge-tree
repo_name: infinitepwn/cs-knowledge-tree
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 学习路线: roadmap.md
  - 知识树:
      - 计算机系统: knowledge/computer-systems.md
      - 计算机网络: knowledge/networking.md
      - 密码学与安全: knowledge/cybersecurity.md
      - 编程与工程实践: knowledge/programming.md
  - 技术栈:
      - 系统方向: stacks/systems.md
      - 安全方向: stacks/security.md
      - 后端方向: stacks/backend.md
      - 嵌入式方向: stacks/embedded.md
  - 课程仓库:
      - 总览: courses/index.md
      - 计算机网络: courses/computer-networking.md
      - 操作系统: courses/operating-system.md
      - 密码学引论: courses/cryptography.md
      - 计算机系统原理: courses/computer-systems.md
  - 课程笔记:
      - 总览: notes/index.md
      - 计算机网络: notes/computer-networking/index.md
      - 操作系统: notes/operating-system/index.md
      - 密码学引论: notes/cryptography/index.md
      - 计算机系统原理: notes/computer-systems/index.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - assets/javascripts/mathjax/tex-svg.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/infinitepwn
